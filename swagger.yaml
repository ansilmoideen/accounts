openapi: 3.0.0
info:
  title: Cloud Accounting Systems API
  version: 1.0.0
  description: >
    API Architecture and Specification for Cloud Accounting Systems. This specification provides deterministic endpoints, strict data typing, robust error handling, and comprehensive relational mapping.
servers:
  - url: https://api.example.com
paths:
  /accounts/v1/masters/groups:
    post:
      summary: Create Account Group
      description: Allows the client application to retrieve predefined groups or create custom sub-groups to track specific operational verticals.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - group_name
                - parent_group_id
              properties:
                group_name:
                  type: string
                  description: Unique identifier for the account.
                parent_group_id:
                  type: string
                  format: uuid
                  description: Links the new group to a parent within the 28 predefined hierarchies.
                alias:
                  type: string
                  description: A secondary, shorthand name.
                nature_of_group:
                  type: string
                  enum:
                  description: Defines the primary financial behavior.
                affect_gross_profit:
                  type: boolean
                  description: Determines if the group's balances impact the Trading Account.
      responses:
        '201':
          description: Account group created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  group_id:
                    type: string
                    format: uuid
                  group_name:
                    type: string
                  status:
                    type: string
                  hierarchy_path:
                    type: string
                  nature_of_group:
                    type: string
                  created_at:
                    type: string
                    format: date-time

  /accounts/v1/masters/ledgers:
    post:
      summary: Create Account Ledger
      description: Provision the supplier's account before recording the purchase voucher.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ledger_name
                - parent_group_id
              properties:
                ledger_name:
                  type: string
                parent_group_id:
                  type: string
                  format: uuid
                opening_balance:
                  type: number
                  format: float
                dr_cr_indicator:
                  type: string
                  enum:
                maintain_bill_wise:
                  type: boolean
                credit_days:
                  type: integer
                mailing_details:
                  type: object
                  properties:
                    address: { type: string }
                    state: { type: string }
                    country: { type: string }
                    pin_code: { type: string }
                tax_information:
                  type: object
                  properties:
                    gstin: { type: string }
                    pan: { type: string }
                    registration_type: { type: string }
                bank_details:
                  type: object
                  properties:
                    account_number: { type: string }
                    ifsc_code: { type: string }
                    bank_name: { type: string }
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ledger_id: { type: string, format: uuid }
                  ledger_name: { type: string }
                  status: { type: string }
                  tax_compliance_status: { type: string }
                  bank_verification_status: { type: string }
                  opening_balance_recorded: { type: number, format: float }
                  created_at: { type: string, format: date-time }

  /accounts/v1/masters/cost-centers:
    post:
      summary: Create Cost Center
      description: Cost Centers allow for the multi-dimensional tracking of expenses and revenues.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cost_center_name
                - category_id
              properties:
                cost_center_name:
                  type: string
                category_id:
                  type: string
                  format: uuid
                parent_center_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Cost center created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cost_center_id: { type: string, format: uuid }
                  cost_center_name: { type: string }
                  status: { type: string }
                  allocation_tree_depth: { type: integer }
                  category_association: { type: string, format: uuid }
                  created_at: { type: string, format: date-time }

  /accounts/v1/inventory/items:
    post:
      summary: Create Stock Item
      description: The Stock Item master represents the individual products manufactured, bought, or sold.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - item_name
                - costing_method
                - gst_setup
              properties:
                item_name: { type: string }
                part_number: { type: string }
                stock_group_id: { type: string, format: uuid }
                costing_method:
                  type: string
                  enum:
                gst_setup:
                  type: object
                  properties:
                    hsn_sac_code: { type: string }
                    tax_rates:
                      type: object
                      properties:
                        igst: { type: number, format: float }
                        cgst: { type: number, format: float }
                        sgst: { type: number, format: float }
      responses:
        '201':
          description: Stock item created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_id: { type: string, format: uuid }
                  item_name: { type: string }
                  status: { type: string }
                  hsn_validation: { type: boolean }
                  valuation_engine_ready: { type: boolean }
                  tax_rate_locked: { type: boolean }
                  created_at: { type: string, format: date-time }

  /accounts/v1/vouchers:
    post:
      summary: Create Voucher
      description: Single, unified endpoint that dynamically alters its validation rules based on the voucher_type parameter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voucher_type
                - voucher_date
                - idempotency_key
              properties:
                voucher_type:
                  type: string
                  enum:
                voucher_date: { type: string, format: date }
                voucher_number: { type: string }
                narration: { type: string }
                idempotency_key: { type: string }
                ledger_entries:
                  type: array
                  items:
                    type: object
                    required:
                      - ledger_id
                      - dr_cr_indicator
                      - amount
                    properties:
                      ledger_id: { type: string, format: uuid }
                      dr_cr_indicator:
                        type: string
                        enum:
                      amount: { type: number, format: float }
                      cost_center_allocations:
                        type: array
                        items:
                          type: object
                          properties:
                            cost_center_name: { type: string }
                            category_id: { type: string, format: uuid }
                            parent_center_id: { type: string, format: uuid }
                      inventory_allocations:
                        type: array
                        items:
                          type: object
                          properties:
                            item_id: { type: string, format: uuid }
                            quantity: { type: number, format: float }
                            rate: { type: number, format: float }
                            amount: { type: number, format: float }
                            batch_details:
                              type: object
                              properties:
                                batch_name: { type: string }
                                manufacturing_date: { type: string, format: date }
                      bill_allocations:
                        type: array
                        items:
                          type: object
                          properties:
                            allocation_type:
                              type: string
                              enum:
                            reference_name: { type: string }
                            amount: { type: number, format: float }
                            credit_period: { type: integer }
      responses:
        '201':
          description: Voucher successfully posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  voucher_id: { type: string, format: uuid }
                  voucher_number: { type: string }
                  transaction_status: { type: string }
                  idempotency_key: { type: string }
                  mathematical_balance:
                    type: object
                    properties:
                      total_debit: { type: number, format: float }
                      total_credit: { type: number, format: float }
                      is_balanced: { type: boolean }
                  posted_at: { type: string, format: date-time }

  /accounts/v1/invoices/generate:
    post:
      summary: Generate Invoice
      description: Takes raw line items and automatically calculates the complex web of applicable taxes, generating a fully compliant payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - party_ledger_id
                - sales_ledger_id
                - items
                - place_of_supply
              properties:
                party_ledger_id: { type: string, format: uuid }
                sales_ledger_id: { type: string, format: uuid }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      item_id: { type: string, format: uuid }
                      quantity: { type: number, format: float }
                      discount_percentage: { type: number, format: float }
                place_of_supply: { type: string }
      responses:
        '200':
          description: Returns a fully constructed, mathematically balanced voucher payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft_voucher_payload: { type: object }
                  tax_computations:
                    type: object
                    properties:
                      tax_type_applied: { type: string }
                      total_taxable_value: { type: number, format: float }
                      total_igst: { type: number, format: float }
                      total_cgst: { type: number, format: float }
                      total_sgst: { type: number, format: float }
                      round_off_amount: { type: number, format: float }
                  invoice_total: { type: number, format: float }

  /accounts/v1/taxes/gst-setup:
    put:
      summary: Update GST Setup
      description: Endpoint to configure and update tax details seamlessly across stock groups, items, and ledgers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_id
                - effective_date
                - hsn_sac_code
                - taxability
                - reverse_charge_applicable
              properties:
                entity_id: { type: string, format: uuid }
                effective_date: { type: string, format: date }
                hsn_sac_code: { type: string }
                taxability:
                  type: string
                  enum:
                tax_rates:
                  type: object
                  properties:
                    igst: { type: number, format: float }
                    cgst: { type: number, format: float }
                    sgst: { type: number, format: float }
                reverse_charge_applicable: { type: boolean }
      responses:
        '200':
          description: GST Setup updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  configuration_id: { type: string, format: uuid }
                  entity_id: { type: string, format: uuid }
                  applied_effective_date: { type: string, format: date }
                  taxability_status: { type: string }
                  status: { type: string }

  /accounts/v1/taxes/e-invoice/generate:
    post:
      summary: Generate E-Invoice
      description: Push the data to the government portal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voucher_id
              properties:
                voucher_id: { type: string, format: uuid }
                distance_in_km: { type: integer }
      responses:
        '200':
          description: Returns government-issued credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  irn: { type: string }
                  qr_code: { type: string }
                  acknowledgment_number: { type: string }
                  acknowledgment_date: { type: string, format: date-time }
                  status: { type: string }
                  error_details: { type: object }

  /accounts/v1/taxes/returns/gstr1:
    get:
      summary: Generate GSTR-1 Return
      description: Compiles the GSTR-1 payload (outward supplies) for direct upload.
      parameters:
        - in: query
          name: from_date
          schema:
            type: string
            format: date
        - in: query
          name: to_date
          schema:
            type: string
            format: date
      responses:
        '200':
          description: A complex JSON grouping transactions exactly per government schemas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gstin: { type: string }
                  fp: { type: string }
                  b2b: { type: array, items: { type: object } }
                  b2cl: { type: array, items: { type: object } }
                  b2cs: { type: array, items: { type: object } }
                  cdnr: { type: array, items: { type: object } }
                  cdnur: { type: array, items: { type: object } }
                  exp: { type: array, items: { type: object } }
                  hsn: { type: object }
                  nil: { type: object }

  /accounts/v1/taxes/reconciliation/gstr2b:
    post:
      summary: Reconcile GSTR-2B
      description: Reconciles the government data against the internal purchase books.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GSTR-2A/2B JSON from the tax portal.
      responses:
        '200':
          description: Reconciliation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  reconciliation_summary: { type: object }
                  matched_invoices:
                    type: array
                    items: { type: string, format: uuid }
                  mismatched_invoices:
                    type: array
                    items:
                      type: object
                      properties:
                        voucher_id: { type: string, format: uuid }
                        discrepancy_type: { type: string }
                        portal_value: { type: number, format: float }
                        book_value: { type: number, format: float }
                  missing_in_books:
                    type: array
                    items:
                      type: object
                      properties:
                        portal_invoice_no: { type: string }
                        supplier_id: { type: string }
                  missing_in_portal:
                    type: array
                    items: { type: object }

  /accounts/v1/reports/balance-sheet:
    get:
      summary: Balance Sheet Report
      description: Provides a real-time, mathematically balanced snapshot of the company's assets, liabilities, and equity.
      parameters:
        - in: query
          name: as_of_date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: format
          schema:
            type: string
            enum:
        - in: query
          name: explode_flag
          schema:
            type: boolean
      responses:
        '200':
          description: Balance Sheet Data
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_date: { type: string, format: date }
                  liabilities:
                    type: object
                    properties:
                      total: { type: number, format: float }
                      groups:
                        type: array
                        items:
                          type: object
                          properties:
                            group_name: { type: string }
                            balance: { type: number, format: float }
                            ledgers: { type: array, items: { type: object } }
                            sub_groups: { type: array, items: { type: object } }
                  assets:
                    type: object
                    properties:
                      total: { type: number, format: float }
                      groups:
                        type: array
                        items:
                          type: object
                          properties:
                            group_name: { type: string }
                            balance: { type: number, format: float }
                            ledgers: { type: array, items: { type: object } }
                            sub_groups: { type: array, items: { type: object } }

  /accounts/v1/reports/profit-and-loss:
    get:
      summary: Profit & Loss Report
      description: Provides an overview of total revenue and total expenses, computing the ultimate Net Profit or Net Loss.
      parameters:
        - in: query
          name: from_date
          schema:
            type: string
            format: date
        - in: query
          name: to_date
          schema:
            type: string
            format: date
        - in: query
          name: detailed_view
          schema:
            type: boolean
      responses:
        '200':
          description: Profit and Loss Data
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_from_date: { type: string, format: date }
                  report_to_date: { type: string, format: date }
                  trading_account:
                    type: object
                    properties:
                      opening_stock: { type: number, format: float }
                      purchases: { type: number, format: float }
                      direct_expenses: { type: array, items: { type: object } }
                      sales: { type: number, format: float }
                      closing_stock: { type: number, format: float }
                      gross_profit: { type: number, format: float }
                  income_statement:
                    type: object
                    properties:
                      indirect_expenses: { type: array, items: { type: object } }
                  net_profit: { type: number, format: float }

  /accounts/v1/reports/outstanding:
    get:
      summary: Outstanding Receivables and Payables
      description: Synthesizes the complex bill-wise allocations logged during voucher entry.
      parameters:
        - in: query
          name: type
          required: true
          schema:
            type: string
            enum:
        - in: query
          name: aging_intervals
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: Array of outstanding bills.
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_type: { type: string }
                  total_outstanding: { type: number, format: float }
                  aging_summary: { type: object }
                  outstanding_bills:
                    type: array
                    items:
                      type: object
                      properties:
                        reference_name: { type: string }
                        party_name: { type: string }
                        pending_amount: { type: number, format: float }
                        due_date: { type: string, format: date }
                        overdue_by_days: { type: integer }

  /accounts/v1/reports/daybook:
    get:
      summary: Day Book Report
      description: Returns a chronological, unedited list of all transactions for a specific date range.
      responses:
        '200':
          description: List of transactions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_transactions: { type: integer }
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        transaction_date: { type: string, format: date }
                        voucher_id: { type: string, format: uuid }
                        voucher_number: { type: string }
                        voucher_type: { type: string }
                        party_ledger_name: { type: string }
                        net_amount: { type: number, format: float }
                        ledger_entries: { type: array, items: { type: object } }

  /accounts/v1/reports/stock-summary:
    get:
      summary: Stock Summary Report
      description: Provides a real-time view of inventory levels, locations, and valuations.
      responses:
        '200':
          description: Inventory data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_time: { type: string, format: date-time }
                  total_inventory_value: { type: number, format: float }
                  stock_items:
                    type: array
                    items:
                      type: object
                      properties:
                        item_id: { type: string, format: uuid }
                        item_name: { type: string }
                        stock_group: { type: string }
                        valuation_method: { type: string }
                        opening_balance: { type: number, format: float }
                        inwards_quantity: { type: number, format: float }
                        outwards_quantity: { type: number, format: float }
                        closing_balance: { type: number, format: float }
                        effective_rate: { type: number, format: float }
                        current_value: { type: number, format: float }
